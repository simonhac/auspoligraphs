name: Deploy gallery to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Vite derives the base path from GITHUB_REPOSITORY (→ /<repo>/), so the
      # site is correct whether the repo is `auspol-hex-cartogram` or renamed
      # to `auspoligraphs`.
      - name: Build gallery
        run: npm run build:site

      # SPA deep-link fallback: GitHub Pages serves 404.html for unknown paths,
      # which re-bootstraps the client router.
      - name: Add SPA 404 fallback
        run: cp dist-site/index.html dist-site/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

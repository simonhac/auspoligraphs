name: Deploy examples to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/data
          cp data/elections.json _site/data/elections.json
          cp examples/vanilla.html _site/vanilla.html
          cp examples/analysis.html _site/analysis.html
          sed -i 's|\.\./data/elections\.json|data/elections.json|g' _site/vanilla.html
          sed -i 's|\.\./data/elections\.json|data/elections.json|g' _site/analysis.html
          cat > _site/index.html <<'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Australian Federal Electorate Hex Cartogram — Examples</title>
          <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #e5e5e5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
          h1 { font-size: 1.6rem; margin-bottom: 8px; }
          p { color: #888; margin-bottom: 32px; }
          .links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
          a { display: block; background: #1a1d27; border: 1px solid #2a2d37; border-radius: 8px; padding: 24px 32px; color: #60a5fa; text-decoration: none; font-size: 1.1rem; transition: border-color 0.15s, background 0.15s; }
          a:hover { background: #222639; border-color: #3a4d7a; }
          a small { display: block; color: #6070a0; font-size: 0.8rem; margin-top: 6px; }
          </style>
          </head>
          <body>
          <h1>Hex Cartogram Examples</h1>
          <p>Australian federal electorate hex cartogram demos</p>
          <div class="links">
          <a href="vanilla.html">Interactive Cartogram<small>Election viewer with tooltips and state borders</small></a>
          <a href="analysis.html">Transition &amp; Error Analysis<small>Side-by-side comparison and geographic analysis</small></a>
          </div>
          </body>
          </html>
          INDEXEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
